<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width" />
    <title>Video Chat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="video-container">
        <div class="video1"><video id="my-video" width="400" height="300" muted="true" autoplay></video></div>
        <div class="video2"><video id="her-video" width="400" height="300" autoplay></video></div>
    </div>

    <div class="tracking-container">
        <div class="traking-result"><canvas id="canvas" width="400" height="300"></canvas></div>
    </div>

    <div class="interface-container">
        <h2>Infomation</h2>
        <p> My Peer ID: <span id="my-peer-id">...</span></p>
        <p> Her Peer ID: <span id="her-peer-id">...</span></p>
        <p> Now: <span id="now-id">...</span></p>
        <!-- Create Room -->
        <p>
            <form id="create-room">
                <input type="text" placeholder="Input My Peer ID" id="my-peer-id-text">
                <button href="#" type="submit">作成</button>
            </form>
        </p>
        <!-- Enter Room -->
        <p>
            <form id="enter-room">
                <input type="text" placeholder="Input Her Peer ID" id="her-peer-id-text">
                <button href="#" type="submit">入室</button>
            </form>
        </p>
        <!-- Leave Room -->
        <p>
            <form id="leave-room">
                <button href="#" type="submit">退出</button>
            </form>
        </p>

    </div>

    <!-- SkyWay 関連ファイルの読み込み -->
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://cdn.webrtc.ecl.ntt.com/skyway-latest.js"></script>
    
    <!-- clmtrackr 関連ファイルの読み込み -->
    <script src="./clmtrackr.js"></script> <!-- clmtrackr のメインライブラリの読み込み -->
    <script src="./model_pca_20_svm.js"></script> <!-- 顔モデル（※）の読み込み -->

    <!-- スクリプトメイン処理 -->
    <script src="./index.js"></script>
</body>

</html>
